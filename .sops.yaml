creation_rules:
  - path_regex: secrets/blue-team\.yaml$
    key_groups:
      - age:
        - *hotel-hightower-host
        - *hotel-hightower-user
        - *lightcycle
  - path_regex: secrets/hotel-hightower\.yaml$
    key_groups:
      - age:
        - *hotel-hightower-host
        - *hotel-hightower-user
  - path_regex: secrets/big-thunder\.yaml$
    key_groups:
      - age:
        - *big-thunder-host
        - *big-thunder-user
  - path_regex: secrets/.*\.yaml$
    key_groups:
      - age:
        - *hotel-hightower-user
        - *lightcycle
        - *big-thunder-user
